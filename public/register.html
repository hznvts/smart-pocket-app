<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar Akun - Smart Pocket</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f4f7f6;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px 0;
      }
      .register-card {
        border: none;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        padding: 30px;
        width: 100%;
        max-width: 450px;
        background-color: white;
      }
      .brand-text {
        color: #0d6efd;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="register-card">
      <div class="text-center mb-4">
        <h2 class="brand-text">👛 Smart Pocket</h2>
        <p class="text-muted">Buat Akun Finansial Anda</p>
      </div>

      <div id="alertPesan" class="alert d-none" role="alert"></div>

      <form id="formRegister">
        <div class="mb-3">
          <label for="nama" class="form-label">Nama Lengkap</label>
          <input
            type="text"
            class="form-control"
            id="nama"
            placeholder="Masukkan nama Anda"
            required
          />
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input
            type="email"
            class="form-control"
            id="email"
            placeholder="Masukkan email aktif"
            required
          />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            id="password"
            placeholder="Buat password (min. 6 karakter)"
            required
            minlength="6"
          />
        </div>
        <div class="mb-4">
          <label for="konfirmasi_password" class="form-label"
            >Konfirmasi Password</label
          >
          <input
            type="password"
            class="form-control"
            id="konfirmasi_password"
            placeholder="Ulangi password"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold mb-3">
          Daftar Sekarang
        </button>
      </form>

      <div class="text-center my-3">
        <span class="text-muted small">ATAU</span>
      </div>
      <div
        id="g_id_onload"
        data-client_id="405074565815-61tjdkkccuusga2u5sbvprf3gqh72d83.apps.googleusercontent.com"
        data-context="signup"
        data-ux_mode="popup"
        data-callback="handleGoogleLogin"
        data-auto_prompt="false"
      ></div>
      <div
        class="g_id_signin d-flex justify-content-center mb-4"
        data-type="standard"
        data-shape="rectangular"
        data-theme="outline"
        data-text="signup_with"
        data-size="large"
        data-logo_alignment="left"
      ></div>

      <div class="text-center">
        <small class="text-muted"
          >Sudah punya akun?
          <a href="login.html" class="text-decoration-none"
            >Masuk di sini</a
          ></small
        >
      </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/register.js"></script>
  </body>
</html>
