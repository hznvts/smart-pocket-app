<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Smart Pocket</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      body {
        background-color: #f4f7f6;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-card {
        border: none;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        padding: 30px;
        width: 100%;
        max-width: 400px;
        background-color: white;
      }
      .brand-text {
        color: #0d6efd;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="text-center mb-4">
        <h2 class="brand-text">👛 Smart Pocket</h2>
        <p class="text-muted">Asisten Finansial Cerdas Anda</p>
      </div>

      <div id="alertPesan" class="alert alert-danger d-none" role="alert"></div>

      <form id="formLogin">
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input
            type="email"
            class="form-control"
            id="email"
            placeholder="Masukkan email Anda"
            required
          />
        </div>
        <div class="mb-4">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            id="password"
            placeholder="Masukkan password"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold mb-3">
          Masuk
        </button>
      </form>
      <div
        class="modal fade"
        id="modalLupaPassword"
        tabindex="-1"
        aria-hidden="true"
      >
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title fw-bold text-primary">
                <i class="fas fa-envelope me-2"></i>Lupa Password
              </h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body">
              <p class="small text-muted">
                Masukkan email yang terdaftar. Kami akan mengirimkan password
                sementara ke email Anda.
              </p>
              <div
                id="alertLupaPassword"
                class="alert d-none py-2 small"
                role="alert"
              ></div>
              <form id="formLupaPassword">
                <div class="mb-3">
                  <input
                    type="email"
                    class="form-control"
                    id="emailLupa"
                    placeholder="Masukkan alamat email"
                    required
                  />
                </div>
                <button
                  type="submit"
                  class="btn btn-primary w-100 fw-bold"
                  id="btnKirimEmail"
                >
                  Kirim Password Sementara
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
      <div class="text-center">
        <small class="text-muted"
          >Belum punya akun?
          <a href="register.html" class="text-decoration-none"
            >Daftar di sini</a
          ></small
        >
      </div>

      <div class="text-center my-3">
        <span class="text-muted small">ATAU</span>
      </div>

      <div
        id="g_id_onload"
        data-client_id="102820732575-j282kddjkqvoqfjca6gsi7o9s6k5thbd.apps.googleusercontent.com"
        data-context="signin"
        data-ux_mode="popup"
        data-callback="handleGoogleLogin"
        data-auto_prompt="false"
      ></div>
      <div
        class="g_id_signin d-flex justify-content-center mb-4"
        data-type="standard"
        data-shape="rectangular"
        data-theme="outline"
        data-text="signin_with"
        data-size="large"
        data-logo_alignment="left"
      ></div>
    </div>

    <script src="js/login.js"></script>
  </body>
</html>
